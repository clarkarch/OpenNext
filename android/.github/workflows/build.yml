name: Android CI

on:
  push:
    branches: [ main, dev, "feature/**" ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Lint, Build & Test
        run: ./gradlew lint assembleDebug assembleRelease testDebugUnitTest --no-daemon --parallel --build-cache

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: opennext-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: opennext-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/test-results/testDebugUnitTest/

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release Bundle
        run: ./gradlew bundleRelease --no-daemon --parallel --build-cache

      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: opennext-debug
          path: artifacts/

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: opennext-release
          path: artifacts/

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: opennext-release-bundle
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ github.run_number }}
          name: Android v${{ github.run_number }}
          files: |
            artifacts/app-debug.apk
            artifacts/app-release-unsigned.apk
            artifacts/app-release.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
